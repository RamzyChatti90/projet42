# Required metadata
sonar.projectKey=com.projet42:projet42
sonar.projectName=projet42
sonar.projectVersion=0.0.1-SNAPSHOT

# Path to the parent project. It's ignored in this project.
# sonar.projectBaseDir=.

# The value of the property must be the key of the language.
sonar.language=java

# Java Sources, Test & Binaries
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# --- Coverage reports configuration ---
# JaCoCo is the standard code coverage tool for Java projects
sonar.java.coveragePlugin=jacoco
# Path to the JaCoCo XML report, generated by Maven JaCoCo plugin
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# --- Other common properties ---
# Define the source file encoding
sonar.sourceEncoding=UTF-8

# Optional: Exclude files from analysis (e.g., generated files, simple DTOs)
# Adapt these exclusions based on your project's specific needs
# sonar.exclusions=**/generated-sources/**, **/*DTO.java, **/*Mapper.java
# sonar.tests.exclusions=**/integration/**